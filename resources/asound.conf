# asound.conf — Reachy Care ALSA configuration (template name-based, 24/04/2026)
# Install: NE PAS copier tel quel. Le placeholder __SPEAKER_CARD__ est substitué
# au démarrage par resources/setup_asoundrc.sh qui détecte la carte de sortie
# USB effectivement branchée (Anker PowerConf S3, dongle USB-C DAC, Jabra, …)
# et écrit le résultat dans ~/.asoundrc.
#
# Sources audio (par NOM de carte, immunisé aux changements d'index au boot) :
#   - XMOS XVF3800 = hw:CARD=Audio (capture 16 kHz S16LE 2ch) → micro + AEC hw.
#     Nom fabricant "Reachy Mini Audio" → toujours CARD=Audio, stable.
#   - Sortie audio = hw:CARD=__SPEAKER_CARD__ (playback) → détecté au boot.
#     Exemples : S3 (Anker PowerConf S3), Device (dongle USB-C DAC).
#
# Architecture : la sortie audio passe par carte USB UAC standard. Le XMOS AEC
# voit le signal de référence via le bouclage interne → peut annuler l'écho
# acoustique. Plus de bluealsa single-client, plus de subprocess aplay
# GIL contention, latence USB <20 ms.
#
# Historique :
#   - 17/04 : BT Claire Beats abandonné → dongle USB-C DAC (hw:CARD=Device).
#   - 22/04 : split canaux XMOS L (ASR) / R (post-PP).
#   - 23/04 : refactor GStreamer SDK push_audio_sample (ring buffer 50ms GLib).
#   - 24/04 : passage en name-based + détection dynamique carte sortie (Anker
#     PowerConf S3 pour Julie en remplacement du dongle USB-C).

# ── Microphone partagé (dsnoop) ────────────────────────────────────────────
# Permet à PyAudio (main.py) et GStreamer (conv_app_v2) de lire le même micro
# XMOS simultanément. hw:CARD=Audio,DEV=0 = XMOS par nom, quel que soit l'index.
pcm.dsnoop_xmos {
    type dsnoop
    ipc_key 5678
    ipc_perm 0666
    slave {
        pcm "hw:CARD=Audio,DEV=0"
        channels 2
        rate 16000
        format S16_LE
        period_size 1024
        buffer_size 4096
    }
}

# ── Resampler haute qualité ────────────────────────────────────────────────
defaults.pcm.rate_converter "speexrate_best"

# ── Microphone partagé alias — requis par has_reachymini_asoundrc() ────────
pcm.reachymini_audio_src {
    type dsnoop
    ipc_key 5678
    ipc_perm 0666
    slave {
        pcm "hw:CARD=Audio,DEV=0"
        channels 2
        rate 16000
        format S16_LE
        period_size 1024
        buffer_size 4096
    }
}

# ── Split canal L / canal R (22/04/2026) ───────────────────────────────────
# XMOS AUDIO_MGR_OP_L=[7,3] (canal L = ASR beamformer, sensible voix distantes)
# et AUDIO_MGR_OP_R=[8,0] (canal R = post-PP propre AGC+noise gate). Les 2 PCMs
# ci-dessous exposent chaque canal en mono via ttable.
#
# Canal L (ASR) → mic_alert_in → wake_word.py + sound_detector.py (cri+chute)
#   Rationale : détection d'alerte vocale a besoin du beamformer pour capter
#   les voix/sons même éloignés ou de côté.
# Canal R (post-PP) → conv_audio_in → conv_app_v2/audio_io.py (OpenAI Realtime)
#   Rationale : conversation propre, noise gate coupe les voix voisines faibles.
pcm.mic_alert_in {
    type plug
    slave.pcm "dsnoop_xmos"
    ttable.0.0 1.0
    ttable.0.1 0.0
}

pcm.conv_audio_in {
    type plug
    slave.pcm "dsnoop_xmos"
    ttable.0.0 0.0
    ttable.0.1 1.0
}

# ── Sortie USB — alias utilisé par la conv_app Pollen et conv_app_v2 ──────
# audio_gstreamer_sdk.py hard-code device="reachymini_audio_sink".
# Le plug convertit le format (rate, channels) vers ce que la carte USB accepte.
# __SPEAKER_CARD__ substitué au boot par resources/setup_asoundrc.sh.
pcm.reachymini_audio_sink {
    type plug
    slave {
        pcm {
            type hw
            card "__SPEAKER_CARD__"
            device 0
        }
    }
}

# ── Default device ─────────────────────────────────────────────────────────
pcm.!default {
    type asym
    playback.pcm "reachymini_audio_sink"
    capture.pcm "dsnoop_xmos"
}

ctl.!default {
    type hw
    card "Audio"
}
